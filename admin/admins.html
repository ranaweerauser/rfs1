<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Accounts — Admin Panel</title>
<link rel="icon" href="../assets/images/logo.jpg" />
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="stylesheet" href="../assets/css/themes.css" />
<link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div id="admin-root"></div>

<script type="module">
  import { initAdminLayout, setPageTitle } from "../assets/js/admin/admin-layout.js";
  import { db, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, COL } from "../assets/js/firebase-config.js";
  import { hasRole } from "../assets/js/auth.js";
  import { escapeHtml, toast, openModal, closeModal } from "../assets/js/ui-helpers.js";

  const session = initAdminLayout("admins.html");

  if (session) {
    if (!hasRole(session, "super_admin")) {
      document.getElementById("admin-page-content").innerHTML = `<div class="empty-state"><div class="icon">🚫</div><p>Only Super Admins can manage admin accounts.</p></div>`;
      setPageTitle("Admin Accounts");
    } else {
      setPageTitle("Admin Accounts");
      document.getElementById("admin-page-content").innerHTML = `
        <div class="admin-toolbar">
          <span class="muted">Add team members with different permission levels.</span>
          <button class="btn btn-primary" id="add-admin-btn">+ Add Admin</button>
        </div>
        <div class="admin-table-wrap pad-20">
          <table class="simple-table">
            <thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="admins-tbody"><tr><td colspan="5" class="center muted">Loading...</td></tr></tbody>
          </table>
        </div>
      `;

      document.getElementById("add-admin-btn").addEventListener("click", () => openAdminModal());

      onSnapshot(collection(db, COL.ADMINS), (snap) => {
        const admins = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
        const tbody = document.getElementById("admins-tbody");
        tbody.innerHTML = admins.map((a) => `
          <tr data-id="${a.id}">
            <td>${escapeHtml(a.username)}</td>
            <td>${escapeHtml(a.name || "—")}</td>
            <td><span class="tag tag-processing">${escapeHtml(a.role)}</span></td>
            <td><span class="tag ${a.active !== false ? "tag-delivered" : "tag-cancelled"}">${a.active !== false ? "Active" : "Disabled"}</span></td>
            <td>
              ${a.role !== "super_admin" ? `<button class="btn btn-sm btn-outline toggle-admin-btn">${a.active !== false ? "Disable" : "Enable"}</button>
              <button class="btn btn-sm btn-danger remove-admin-btn">Delete</button>` : `<span class="muted" style="font-size:12px;">Protected</span>`}
            </td>
          </tr>`).join("");

        tbody.querySelectorAll(".toggle-admin-btn").forEach((btn) => {
          btn.onclick = async () => {
            const id = btn.closest("tr").dataset.id;
            const admin = admins.find((a) => a.id === id);
            await updateDoc(doc(db, COL.ADMINS, id), { active: admin.active === false });
            toast("Admin status updated.", "success");
          };
        });
        tbody.querySelectorAll(".remove-admin-btn").forEach((btn) => {
          btn.onclick = async () => {
            if (!confirm("Remove this admin account permanently?")) return;
            await deleteDoc(doc(db, COL.ADMINS, btn.closest("tr").dataset.id));
            toast("Admin removed.", "success");
          };
        });
      });
    }
  }

  async function sha256(text) {
    const enc = new TextEncoder().encode(text);
    const hashBuf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(hashBuf)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function openAdminModal() {
    openModal(`
      <h3>Add New Admin</h3>
      <div class="field"><label>Full Name</label><input type="text" class="input" id="na-name" /></div>
      <div class="field"><label>Username *</label><input type="text" class="input" id="na-username" /></div>
      <div class="field"><label>Password *</label><input type="password" class="input" id="na-password" /></div>
      <div class="field"><label>Role</label>
        <select class="input" id="na-role">
          <option value="admin">Admin (Full access except admin accounts)</option>
          <option value="order_manager">Order Manager (Orders only)</option>
          <option value="product_manager">Product Manager (Products & Categories only)</option>
        </select>
      </div>
      <div class="flex gap-12" style="margin-top:18px;">
        <button class="btn btn-primary" id="save-admin-btn" style="flex:1;">Add Admin</button>
        <button class="btn btn-outline" id="cancel-admin-btn">Cancel</button>
      </div>
    `);

    document.getElementById("cancel-admin-btn").addEventListener("click", closeModal);
    document.getElementById("save-admin-btn").addEventListener("click", async () => {
      const username = document.getElementById("na-username").value.trim();
      const password = document.getElementById("na-password").value;
      const name = document.getElementById("na-name").value.trim();
      const role = document.getElementById("na-role").value;
      if (!username || !password) return toast("Username and password are required.", "error");
      if (password.length < 6) return toast("Password must be at least 6 characters.", "error");

      try {
        const passwordHash = await sha256(password);
        const id = username.toLowerCase().replace(/[^a-z0-9]/g, "-") + "-" + Date.now();
        await setDoc(doc(db, COL.ADMINS, id), {
          username, name, role, passwordHash, active: true, createdAt: serverTimestamp()
        });
        toast("✅ Admin account created.", "success");
        closeModal();
      } catch (e) {
        toast("Failed to create admin.", "error");
      }
    });
  }
</script>
</body>
</html>
