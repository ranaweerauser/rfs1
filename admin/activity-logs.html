<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity Logs — Admin Panel</title>
<link rel="icon" href="../assets/images/logo.jpg" />
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="stylesheet" href="../assets/css/themes.css" />
<link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div id="admin-root"></div>

<script type="module">
  import { initAdminLayout, setPageTitle } from "../assets/js/admin/admin-layout.js";
  import { db, collection, query, orderBy, limit, getDocs, COL } from "../assets/js/firebase-config.js";
  import { escapeHtml, formatDate } from "../assets/js/ui-helpers.js";

  const session = initAdminLayout("activity-logs.html");

  if (session) {
    setPageTitle("Admin Activity Logs");
    document.getElementById("admin-page-content").innerHTML = `
      <div class="admin-table-wrap pad-20">
        <table class="simple-table">
          <thead><tr><th>Admin</th><th>Action</th><th>Date & Time</th><th>Device</th></tr></thead>
          <tbody id="logs-tbody"><tr><td colspan="4" class="center muted">Loading...</td></tr></tbody>
        </table>
      </div>
    `;

    async function loadLogs() {
      try {
        const q = query(collection(db, COL.ADMIN_LOGS), orderBy("timestamp", "desc"), limit(100));
        const snap = await getDocs(q);
        const logs = snap.docs.map((d) => d.data());
        const tbody = document.getElementById("logs-tbody");
        if (!logs.length) {
          tbody.innerHTML = `<tr><td colspan="4" class="center muted">No activity recorded yet.</td></tr>`;
          return;
        }
        tbody.innerHTML = logs.map((l) => `
          <tr>
            <td>${escapeHtml(l.username)}</td>
            <td><span class="tag tag-processing">${escapeHtml(l.action)}</span></td>
            <td style="font-size:12.5px;">${formatDate(l.timestamp)}</td>
            <td style="font-size:11.5px; max-width:260px;" class="muted">${escapeHtml((l.userAgent || "").slice(0, 60))}</td>
          </tr>`).join("");
      } catch (e) {
        document.getElementById("logs-tbody").innerHTML = `<tr><td colspan="4" class="center muted">Could not load activity logs.</td></tr>`;
      }
    }
    loadLogs();
  }
</script>
</body>
</html>
