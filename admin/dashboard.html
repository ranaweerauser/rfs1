<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Admin Panel</title>
<link rel="icon" href="../assets/images/logo.jpg" />
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="stylesheet" href="../assets/css/themes.css" />
<link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div id="admin-root"></div>

<script type="module">
  import { initAdminLayout, setPageTitle } from "../assets/js/admin/admin-layout.js";
  import { subscribeAllOrders, getOrderStats, ORDER_STATUS } from "../assets/js/orders.js";
  import { getLowStockProducts } from "../assets/js/products.js";
  import { db, collection, getDocs, COL } from "../assets/js/firebase-config.js";
  import { escapeHtml, formatCurrency, formatDate, toast } from "../assets/js/ui-helpers.js";

  const session = initAdminLayout("dashboard.html");
  if (session) {
    setPageTitle("Dashboard");
    document.getElementById("admin-page-content").innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><span class="stat-icon">📦</span><span class="stat-value" id="stat-total-orders">—</span><span class="stat-label">Total Orders</span></div>
        <div class="stat-card"><span class="stat-icon">🕒</span><span class="stat-value" id="stat-today-orders">—</span><span class="stat-label">Today's Orders</span></div>
        <div class="stat-card"><span class="stat-icon">🛒</span><span class="stat-value" id="stat-total-products">—</span><span class="stat-label">Total Products</span></div>
        <div class="stat-card"><span class="stat-icon">👥</span><span class="stat-value" id="stat-total-customers">—</span><span class="stat-label">Total Customers</span></div>
        <div class="stat-card"><span class="stat-icon">⚠️</span><span class="stat-value" id="stat-low-stock">—</span><span class="stat-label">Low Stock Products</span></div>
        <div class="stat-card"><span class="stat-icon">🔔</span><span class="stat-value" id="stat-unseen">—</span><span class="stat-label">Unreviewed Orders</span></div>
        <div class="stat-card"><span class="stat-icon">💰</span><span class="stat-value" id="stat-revenue">—</span><span class="stat-label">Revenue (Delivered Orders)</span></div>
      </div>

      <div class="grid" style="grid-template-columns:1.6fr 1fr; gap:20px; margin-top:24px; align-items:start;">
        <div class="admin-table-wrap pad-20">
          <h3>Recent Orders</h3>
          <table class="simple-table" style="margin-top:12px;">
            <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="recent-orders-tbody"><tr><td colspan="5" class="center muted">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="card pad-20">
          <h3>⚠️ Low Stock Alerts</h3>
          <div id="low-stock-list" style="margin-top:12px;"></div>
        </div>
      </div>
    `;

    loadStats();
    subscribeAllOrders((orders) => renderRecentOrders(orders.slice(0, 8)));
    loadLowStock();
  }

  async function loadStats() {
    try {
      const [stats, productsSnap, customersSnap] = await Promise.all([
        getOrderStats(),
        getDocs(collection(db, COL.PRODUCTS)),
        getDocs(collection(db, COL.CUSTOMERS))
      ]);
      document.getElementById("stat-total-orders").textContent = stats.totalOrders;
      document.getElementById("stat-today-orders").textContent = stats.todaysOrders;
      document.getElementById("stat-total-products").textContent = productsSnap.size;
      document.getElementById("stat-total-customers").textContent = customersSnap.size;
      document.getElementById("stat-revenue").textContent = formatCurrency(stats.revenue);
      document.getElementById("stat-unseen").textContent = stats.unseenOrders;
    } catch (e) {
      console.error(e);
      toast("Failed to load some dashboard stats.", "error");
    }
  }

  function renderRecentOrders(orders) {
    const tbody = document.getElementById("recent-orders-tbody");
    if (!orders.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="center muted">No orders yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = orders.map((o) => `
      <tr>
        <td><a href="orders.html?id=${o.id}">${escapeHtml(o.orderId)}</a></td>
        <td>${escapeHtml(o.customerName)}</td>
        <td>${formatCurrency(o.total)}</td>
        <td><span class="tag tag-${o.status}">${o.status}</span></td>
        <td>${formatDate(o.createdAt)}</td>
      </tr>`).join("");
  }

  async function loadLowStock() {
    const mount = document.getElementById("low-stock-list");
    try {
      const products = await getLowStockProducts(10);
      document.getElementById("stat-low-stock").textContent = products.length;
      if (!products.length) {
        mount.innerHTML = `<p class="muted" style="font-size:13px;">All products are well stocked. 🎉</p>`;
        return;
      }
      mount.innerHTML = products.map((p) => `
        <div class="flex justify-between items-center" style="padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:13.5px;">
          <span>${escapeHtml(p.name)}</span>
          <span class="stock-tag ${p.stock === 0 ? "stock-out" : "stock-low"}">${p.stock} left</span>
        </div>`).join("");
    } catch (e) {
      mount.innerHTML = `<p class="muted">Could not load stock data.</p>`;
    }
  }
</script>
</body>
</html>
