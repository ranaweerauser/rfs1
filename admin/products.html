<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Products — Admin Panel</title>
<link rel="icon" href="../assets/images/logo.jpg" />
<link rel="stylesheet" href="../assets/css/style.css" />
<link rel="stylesheet" href="../assets/css/themes.css" />
<link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div id="admin-root"></div>

<script type="module">
  import { initAdminLayout, setPageTitle } from "../assets/js/admin/admin-layout.js";
  import {
    subscribeProductsPage, subscribeSearchProducts, addProduct, updateProduct, deleteProduct, getCategories, getProductById
  } from "../assets/js/products.js";
  import { uploadToCloudinary } from "../assets/js/cloudinary.js";
  import { escapeHtml, formatCurrency, toast, openModal, closeModal } from "../assets/js/ui-helpers.js";
  import { UNIT_TYPES, getUnitMeta, formatQuantity } from "../assets/js/pricing.js";

  const session = initAdminLayout("products.html");
  let categories = [];
  let activeUnsubscribe = null;
  let currentSearch = "";

  if (session) {
    setPageTitle("Product Management");
    document.getElementById("admin-page-content").innerHTML = `
      <div class="admin-toolbar">
        <input type="text" class="input" id="product-search" placeholder="Search products by name..." style="max-width:320px;" />
        <button class="btn btn-primary" id="add-product-btn">+ Add New Product</button>
      </div>
      <div class="admin-table-wrap pad-20">
        <table class="simple-table">
          <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Unit Type</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="products-tbody"><tr><td colspan="8" class="center muted">Loading products...</td></tr></tbody>
        </table>
      </div>
    `;

    categories = await getCategories();
    document.getElementById("add-product-btn").addEventListener("click", () => openProductModal());
    document.getElementById("product-search").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        currentSearch = e.target.value.trim();
        loadProducts();
      }
    });

    loadProducts();
  }

  function stopListener() {
    if (activeUnsubscribe) { activeUnsubscribe(); activeUnsubscribe = null; }
  }

  function loadProducts() {
    const tbody = document.getElementById("products-tbody");
    tbody.innerHTML = `<tr><td colspan="8" class="center muted">Loading...</td></tr>`;
    stopListener();

    if (currentSearch) {
      activeUnsubscribe = subscribeSearchProducts(currentSearch, ({ items }) => renderRows(items), { activeOnly: false });
    } else {
      activeUnsubscribe = subscribeProductsPage({ pageSize: 200, activeOnly: false }, ({ items }) => renderRows(items));
    }
  }

  function renderRows(items) {
    const tbody = document.getElementById("products-tbody");
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="center muted">No products found. Add your first product!</td></tr>`;
      return;
    }
    tbody.innerHTML = items.map(rowHtml).join("");
    bindRowActions(items);
  }

  function rowHtml(p) {
    const catName = categories.find((c) => c.id === p.categoryId)?.name || "—";
    const meta = getUnitMeta(p.unitType);
    return `
    <tr data-id="${p.id}">
      <td><img class="product-thumb-mini" src="${p.images?.[0] || "../assets/images/logo.jpg"}" /></td>
      <td>${escapeHtml(p.name)}</td>
      <td>${escapeHtml(catName)}</td>
      <td>${meta.icon} ${escapeHtml(meta.label)}</td>
      <td>${formatCurrency(p.hasDiscount ? p.discountPrice : p.basePrice)}${p.hasDiscount ? ` <span class="muted" style="text-decoration:line-through;font-size:11px;">${formatCurrency(p.basePrice)}</span>` : ""}</td>
      <td>${formatQuantity(p.unitType, p.stock)}</td>
      <td><span class="tag ${p.active !== false ? "tag-delivered" : "tag-cancelled"}">${p.active !== false ? "Active" : "Hidden"}</span></td>
      <td>
        <button class="btn btn-sm btn-outline edit-btn">Edit</button>
        <button class="btn btn-sm btn-danger delete-btn">Delete</button>
      </td>
    </tr>`;
  }

  function bindRowActions(items) {
    document.querySelectorAll(".edit-btn").forEach((btn) => {
      btn.onclick = async () => {
        const id = btn.closest("tr").dataset.id;
        const product = items.find((p) => p.id === id) || await getProductById(id);
        openProductModal(product);
      };
    });
    document.querySelectorAll(".delete-btn").forEach((btn) => {
      btn.onclick = async () => {
        const row = btn.closest("tr");
        if (!confirm("Delete this product permanently?")) return;
        await deleteProduct(row.dataset.id);
        toast("Product deleted.", "success");
      };
    });
  }

  function openProductModal(product = null) {
    const isEdit = !!product;
    let uploadedImages = product?.images ? [...product.images] : [];
    const selectedUnit = product?.unitType || "item";

    openModal(`
      <h3>${isEdit ? "Edit Product" : "Add New Product"}</h3>
      <div class="field"><label>Product Name *</label><input type="text" class="input" id="pf-name" value="${escapeHtml(product?.name || "")}" /></div>

      <div class="field"><label>Category</label>
        <select class="input" id="pf-category">
          <option value="">— None —</option>
          ${categories.map((c) => `<option value="${c.id}" ${product?.categoryId === c.id ? "selected" : ""}>${c.icon || "🛒"} ${escapeHtml(c.name)}</option>`).join("")}
        </select>
      </div>

      <div class="field">
        <label>Quantity Type *</label>
        <select class="input" id="pf-unittype">
          ${UNIT_TYPES.map((u) => `<option value="${u.value}" ${selectedUnit === u.value ? "selected" : ""}>${u.icon} ${escapeHtml(u.label)}</option>`).join("")}
        </select>
        <p class="muted" style="font-size:12px; margin-top:6px;" id="unit-help-text"></p>
      </div>

      <div class="flex gap-12">
        <div class="field" style="flex:1;"><label id="pf-price-label">Price *</label><input type="number" class="input" id="pf-price" value="${product?.basePrice ?? ""}" /></div>
        <div class="field" style="flex:1;"><label>Discount Price (optional)</label><input type="number" class="input" id="pf-discount" value="${product?.discountPrice ?? ""}" /></div>
      </div>
      <div class="field"><label id="pf-stock-label">Stock Quantity *</label><input type="number" class="input" id="pf-stock" value="${product?.stock ?? 0}" />
        <p class="muted" style="font-size:11.5px; margin-top:4px;" id="stock-help-text"></p>
      </div>

      <div class="field">
        <label>Product Images</label>
        <div class="image-upload-box" id="image-upload-box">📷 Click to upload images (max 8MB each)</div>
        <input type="file" id="pf-image-input" accept="image/*" multiple style="display:none;" />
        <div class="image-preview-grid" id="image-preview-grid"></div>
      </div>

      <label class="flex items-center gap-8" style="margin:6px 0;"><input type="checkbox" id="pf-bestdeals" ${product?.bestDeals ? "checked" : ""} /> Add to <strong>Best Deals</strong> tab (shows with discount badge)</label>
      <label class="flex items-center gap-8" style="margin:6px 0;"><input type="checkbox" id="pf-active" ${product?.active !== false ? "checked" : ""} /> Active (visible to customers)</label>

      <div class="flex gap-12" style="margin-top:18px;">
        <button class="btn btn-primary" id="save-product-btn" style="flex:1;">${isEdit ? "Save Changes" : "Add Product"}</button>
        <button class="btn btn-outline" id="cancel-product-btn">Cancel</button>
      </div>
    `, { wide: true });

    function updateUnitHelp() {
      const unitType = document.getElementById("pf-unittype").value;
      const meta = getUnitMeta(unitType);
      const priceLabel = document.getElementById("pf-price-label");
      const stockLabel = document.getElementById("pf-stock-label");
      const helpText = document.getElementById("unit-help-text");
      const stockHelp = document.getElementById("stock-help-text");

      if (meta.family === "weight") {
        priceLabel.textContent = "Price per 1Kg (Rs.) *";
        stockLabel.textContent = "Stock Quantity (in grams) *";
        helpText.textContent = unitType === "g"
          ? "Customers will be able to choose 250g, 500g or 750g."
          : "Customers can choose from 250g up to 100Kg, in 250g steps.";
        stockHelp.textContent = "Enter total stock in GRAMS (e.g. 5000 = 5Kg available).";
      } else if (meta.family === "volume") {
        priceLabel.textContent = "Price per 1L (Rs.) *";
        stockLabel.textContent = "Stock Quantity (in ml) *";
        helpText.textContent = unitType === "ml"
          ? "Customers will be able to choose 250ml, 500ml or 750ml."
          : "Customers can choose from 250ml up to 100L, in 250ml steps.";
        stockHelp.textContent = "Enter total stock in MILLILITERS (e.g. 5000 = 5L available).";
      } else {
        priceLabel.textContent = `Price per 1 ${meta.label} (Rs.) *`;
        stockLabel.textContent = `Stock Quantity (number of ${meta.label}) *`;
        helpText.textContent = "Customers can choose between 1 and 100.";
        stockHelp.textContent = "Enter the total count available.";
      }
    }
    updateUnitHelp();
    document.getElementById("pf-unittype").addEventListener("change", updateUnitHelp);

    function renderImagePreviews() {
      document.getElementById("image-preview-grid").innerHTML = uploadedImages.map((url, i) => `
        <div class="preview-item"><img src="${url}" /><button class="remove-img" data-i="${i}">✕</button></div>`).join("");
      document.querySelectorAll(".remove-img").forEach((btn) => {
        btn.onclick = () => { uploadedImages.splice(Number(btn.dataset.i), 1); renderImagePreviews(); };
      });
    }
    renderImagePreviews();

    async function handleImageInputChange(e) {
      const files = Array.from(e.target.files);
      const box = document.getElementById("image-upload-box");
      const originalLabel = "📷 Click to upload images (max 8MB each)";
      for (const file of files) {
        box.textContent = `Uploading ${file.name}...`;
        try {
          const result = await uploadToCloudinary(file);
          uploadedImages.push(result.url);
        } catch (err) {
          toast(err.message, "error");
        }
      }
      box.textContent = originalLabel;
      e.target.value = "";
      renderImagePreviews();
    }

    document.getElementById("image-upload-box").addEventListener("click", () => {
      document.getElementById("pf-image-input").click();
    });
    document.getElementById("pf-image-input").addEventListener("change", handleImageInputChange);

    document.getElementById("cancel-product-btn").addEventListener("click", closeModal);

    document.getElementById("save-product-btn").addEventListener("click", async () => {
      const name = document.getElementById("pf-name").value.trim();
      const basePrice = Number(document.getElementById("pf-price").value);
      if (!name) return toast("Product name is required.", "error");
      if (!basePrice || basePrice <= 0) return toast("Please enter a valid price.", "error");

      const payload = {
        name,
        categoryId: document.getElementById("pf-category").value || null,
        unitType: document.getElementById("pf-unittype").value,
        basePrice,
        discountPrice: Number(document.getElementById("pf-discount").value) || null,
        stock: Number(document.getElementById("pf-stock").value) || 0,
        images: uploadedImages,
        active: document.getElementById("pf-active").checked,
        bestDeals: document.getElementById("pf-bestdeals").checked
      };

      const saveBtn = document.getElementById("save-product-btn");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        if (isEdit) {
          await updateProduct(product.id, payload);
          toast("Product updated successfully.", "success");
        } else {
          await addProduct(payload);
          toast("Product added successfully.", "success");
        }
        closeModal();
      } catch (e) {
        console.error(e);
        toast("Failed to save product.", "error");
        saveBtn.disabled = false;
        saveBtn.textContent = isEdit ? "Save Changes" : "Add Product";
      }
    });
  }
</script>
</body>
</html>
