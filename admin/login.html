<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Ranaweera Family Super</title>
<link rel="icon" href="../assets/images/logo.jpg" />
<link rel="stylesheet" href="../assets/css/style.css" />
<style>
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f0a05 0%,#1a0f0a 50%,#120a0f 100%);
  padding:20px;
}
.login-box{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;
  padding:40px 32px;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
  color:#f4e7d2;
}
.login-logo{
  display:block;
  width:80px;
  height:80px;
  border-radius:18px;
  object-fit:cover;
  margin:0 auto 16px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  animation:logoIn .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes logoIn{from{transform:scale(.6) rotate(-10deg);opacity:0;}to{transform:scale(1);opacity:1;}}
.login-title{text-align:center;font-family:var(--font-head,'Playfair Display',serif);font-size:22px;font-weight:800;color:#f4d77b;margin-bottom:4px;}
.login-sub{text-align:center;font-size:12.5px;opacity:.7;margin-bottom:28px;}
.gl-input{
  width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);color:#f4e7d2;font-family:inherit;font-size:15px;
  margin-bottom:14px;box-sizing:border-box;outline:none;transition:border-color .2s;
}
.gl-input:focus{border-color:#caa23f;}
.gl-input::placeholder{color:rgba(244,231,210,0.5);}
.gl-label{display:block;font-size:12px;font-weight:600;opacity:.75;margin-bottom:6px;letter-spacing:.3px;}
.gl-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#f4d77b 0%,#caa23f 55%,#9a7321 100%);
  color:#2a1505;font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:transform .15s ease,box-shadow .2s ease;
  box-shadow:0 6px 20px rgba(202,162,63,0.35);
}
.gl-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(202,162,63,0.45);}
.gl-btn:active{transform:scale(.97);}
.gl-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-box{
  background:rgba(192,57,43,0.25);border:1px solid rgba(192,57,43,0.5);
  color:#f5b7b1;padding:12px 14px;border-radius:10px;font-size:13px;
  margin-bottom:14px;display:none;
}
.hint-box{
  background:rgba(202,162,63,0.12);border:1px solid rgba(202,162,63,0.25);
  color:#f4d77b;padding:12px 14px;border-radius:10px;font-size:12px;
  margin-top:16px;line-height:1.6;display:none;
}
.spinner-btn{display:inline-flex;align-items:center;gap:10px;}
.btn-spinner{width:18px;height:18px;border:2.5px solid rgba(42,21,5,0.4);border-top-color:#2a1505;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="login-box">
  <img src="../assets/images/logo.jpg" alt="logo" class="login-logo" />
  <div class="login-title">Admin Panel</div>
  <div class="login-sub">Ranaweera Family Super</div>

  <form id="login-form">
    <label class="gl-label">Username</label>
    <input type="text" class="gl-input" id="login-username" autocomplete="username"
      placeholder="Enter username" required />

    <label class="gl-label">Password</label>
    <input type="password" class="gl-input" id="login-password" autocomplete="current-password"
      placeholder="Enter password" required />

    <div class="error-box" id="login-error"></div>

    <button type="submit" class="gl-btn" id="login-submit-btn">Login to Admin Panel</button>
  </form>

  <div class="hint-box" id="setup-hint">
    <strong>⚙️ First-time setup tip:</strong><br/>
    If login keeps failing, make sure your <strong>Firestore Database</strong> is created in Firebase Console
    (Build → Firestore Database → Create Database → Production mode).<br/>
    The default login will still work once Firestore is reachable.
  </div>

  <a href="../index.html" style="display:block;text-align:center;margin-top:18px;font-size:12.5px;opacity:.6;color:#f4e7d2;">← Back to Website</a>
</div>

<script type="module">
  import { adminLogin, seedDefaultAdminIfNeeded, getAdminSession } from "../assets/js/auth.js";

  if (getAdminSession()) window.location.href = "dashboard.html";

  // Try seeding but don't block the UI on it
  seedDefaultAdminIfNeeded().catch(() => {});

  const form = document.getElementById("login-form");
  const errorBox = document.getElementById("login-error");
  const hintBox = document.getElementById("setup-hint");
  const submitBtn = document.getElementById("login-submit-btn");
  let failCount = 0;

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.style.display = "none";
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    submitBtn.disabled = true;
    submitBtn.innerHTML = `<span class="spinner-btn"><span class="btn-spinner"></span>Logging in...</span>`;

    try {
      await adminLogin(username, password);
      submitBtn.innerHTML = `<span class="spinner-btn"><span class="btn-spinner"></span>Loading dashboard...</span>`;
      window.location.href = "dashboard.html";
    } catch (err) {
      failCount++;
      errorBox.textContent = err.message || "Login failed. Please check your credentials.";
      errorBox.style.display = "block";
      if (failCount >= 2) hintBox.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Login to Admin Panel";
    }
  });
</script>
</body>
</html>
