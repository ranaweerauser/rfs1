<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Checkout — Ranaweera Family Super</title>
<link rel="icon" href="assets/images/logo.jpg"/>
<link rel="stylesheet" href="assets/css/style.css"/>
<link rel="stylesheet" href="assets/css/themes.css"/>
<style>
.co-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
@media(max-width:880px){.co-layout{grid-template-columns:1fr;}}
.dopt{border:2px solid var(--border-soft);border-radius:var(--radius-md);padding:16px;cursor:pointer;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;transition:all .18s ease;}
.dopt.active{border-color:var(--green-dark);background:var(--green-light);}
.mini-line{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13.5px;}
.mini-line:last-child{border-bottom:none;}
.mini-line img{width:42px;height:42px;border-radius:8px;object-fit:cover;}
</style>
</head>
<body>
<header id="app-header" class="site-header"></header>
<div class="page-hero"><h1>Checkout</h1><p>Almost there — fill in your details to place your order</p></div>
<main class="container section" id="checkout-main"></main>
<div id="app-floats"></div><nav id="app-bottomnav"></nav>
<footer id="app-footer" class="site-footer"></footer>
<script type="module">
  import "./assets/js/layout.js";
  import { getCart, cartTotals, clearCart, meetsMinimumOrder, cartLinePrice, cartLineLabel } from "./assets/js/cart.js";
  import { placeOrder, buildWhatsAppOrderLink } from "./assets/js/orders.js";
  import { getCurrentUser, getCurrentCustomerProfile, onAuthChange, loginWithGoogle } from "./assets/js/auth.js";
  import { escapeHtml, formatCurrency, toast } from "./assets/js/ui-helpers.js";
  import { subscribeSettings } from "./assets/js/settings.js";

  const main = document.getElementById("checkout-main");
  let deliveryMethod = "delivery";
  const items = getCart();

  onAuthChange((user, profile) => {
    if (!user) {
      main.innerHTML = `
        <div class="card pad-32 text-center" style="max-width:440px;margin:0 auto;">
          <div style="font-size:48px;margin-bottom:16px;">🔒</div>
          <h2>Login Required</h2>
          <p class="muted" style="margin-bottom:20px;">Sign in with Google to securely place and track your order.</p>
          <button class="btn btn-primary btn-block btn-lg" id="co-login-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" style="margin-right:8px;"><path fill="#fff" d="M12 11h8.5c.1.5.1 1 .1 1.5 0 5-3.35 8.5-8.6 8.5A8.5 8.5 0 1 1 12 3.5c2.3 0 4.3.85 5.8 2.2L15.4 8.1A5.3 5.3 0 0 0 12 6.8c-3.1 0-5.3 2.3-5.3 5.2s2.2 5.2 5.3 5.2c2.8 0 4.3-1.6 4.7-3.2H12v-3Z"/></svg>
            Login with Google
          </button>
          <a href="cart.html" class="btn btn-ghost btn-block" style="margin-top:10px;">← Back to Cart</a>
        </div>`;
      document.getElementById("co-login-btn").onclick = async () => {
        try { await loginWithGoogle(); } catch(e) { toast(e.message==="DOMAIN_NOT_AUTHORIZED"?"⚠️ Add domain to Firebase Authorized Domains.":"Login failed.","error"); }
      };
      return;
    }
    if (!items.length) {
      main.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><p>Your cart is empty.</p><a href="products.html" class="btn btn-primary" style="margin-top:16px;">Go Shopping</a></div>`;
      return;
    }
    renderForm(user, profile);
  });

  function renderForm(user, profile) {
    main.innerHTML = `
      <div class="co-layout">
        <div>
          <div class="card pad-24" style="margin-bottom:20px;">
            <h3 style="margin-bottom:18px;">👤 Customer Details</h3>
            <div class="field"><label>Full Name *</label><input type="text" class="input" id="co-name" value="${escapeHtml(profile?.name||user.displayName||"")}"/></div>
            <div class="field"><label>Mobile Number *</label><input type="tel" class="input" id="co-phone" placeholder="07XXXXXXXX" value="${escapeHtml(profile?.phone||"")}"/></div>
            <div class="field" id="co-addr-wrap"><label>Delivery Address *</label><textarea class="input" id="co-address" placeholder="House No, Street, City"></textarea></div>
            <div class="field"><label>Order Notes (optional)</label><textarea class="input" id="co-notes" placeholder="Any special instructions…"></textarea></div>
          </div>
          <div class="card pad-24">
            <h3 style="margin-bottom:6px;">🚚 Delivery Method</h3>
            <div class="delivery-highlight" id="delivery-area-note" style="margin-bottom:16px;"></div>
            <label class="dopt active" data-method="delivery">
              <input type="radio" name="dmethod" value="delivery" checked style="margin-top:3px;accent-color:var(--green-dark);"/>
              <div><strong>🚚 Cash On Delivery</strong><p class="muted" style="font-size:13px;margin:4px 0 0;">Pay in cash when your order arrives.</p></div>
            </label>
            <label class="dopt" data-method="pickup">
              <input type="radio" name="dmethod" value="pickup" style="margin-top:3px;accent-color:var(--green-dark);"/>
              <div><strong>🏬 Self Pickup</strong><p class="muted" style="font-size:13px;margin:4px 0 0;">Collect &amp; pay at our store in person.</p></div>
            </label>
          </div>
        </div>
        <div class="card pad-24">
          <h3 style="margin-bottom:16px;">📋 Order Summary</h3>
          <div id="co-items-mount"></div>
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;"><span>Subtotal</span><span id="co-sub"></span></div>
          <div class="sum-row" style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;"><span>Delivery</span><span id="co-del"></span></div>
          <div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:800;font-size:18px;border-top:2px solid var(--border-soft);margin-top:8px;color:var(--green-dark);"><span>Total</span><span id="co-tot"></span></div>
          <button class="btn btn-primary btn-block btn-lg" id="place-btn" style="margin-top:16px;">Place Order →</button>
          <p class="muted text-center" style="font-size:12px;margin-top:10px;">By placing this order you agree to our <a href="terms.html" style="color:var(--green-dark);text-decoration:underline;">Terms</a>.</p>
        </div>
      </div>`;

    subscribeSettings((s) => {
      document.getElementById("delivery-area-note").innerHTML = `🚚 ${escapeHtml(s.deliveryAreaNote||"")}`;
    });

    const coItemsMount = document.getElementById("co-items-mount");
    coItemsMount.innerHTML = items.map((i) => `
      <div class="mini-line">
        <img src="${i.image||"assets/images/logo.jpg"}"/>
        <div style="flex:1;">${escapeHtml(i.name)} <span class="muted">(${cartLineLabel(i)})</span></div>
        <strong>${formatCurrency(cartLinePrice(i))}</strong>
      </div>`).join("");

    function updateTotals() {
      const tot = cartTotals(deliveryMethod);
      document.getElementById("co-sub").textContent = formatCurrency(tot.subtotal);
      document.getElementById("co-del").textContent = tot.deliveryFee===0?"FREE ✅":formatCurrency(tot.deliveryFee);
      document.getElementById("co-tot").textContent = formatCurrency(tot.total);
    }

    document.querySelectorAll(".dopt").forEach((opt) => {
      opt.addEventListener("click", () => {
        document.querySelectorAll(".dopt").forEach((o) => o.classList.remove("active"));
        opt.classList.add("active");
        opt.querySelector("input").checked = true;
        deliveryMethod = opt.dataset.method;
        document.getElementById("co-addr-wrap").style.display = deliveryMethod==="pickup"?"none":"";
        updateTotals();
      });
    });

    document.getElementById("place-btn").addEventListener("click", async () => {
      const name = document.getElementById("co-name").value.trim();
      const phone = document.getElementById("co-phone").value.trim();
      const address = document.getElementById("co-address").value.trim();
      const notes = document.getElementById("co-notes").value.trim();
      if (!name||!phone) return toast("Please fill in your name and mobile number.","error");
      if (deliveryMethod==="delivery"&&!address) return toast("Please enter your delivery address.","error");
      if (!meetsMinimumOrder()) return toast("Order total is below minimum.","error");
      if (!/^[0-9+\s-]{9,15}$/.test(phone)) return toast("Please enter a valid mobile number.","error");
      const btn = document.getElementById("place-btn");
      btn.disabled = true;
      btn.innerHTML = `<span class="btn-spinner-inline"></span> Placing Order…`;
      try {
        const tot = cartTotals(deliveryMethod);
        const order = await placeOrder({ customer:{uid:user.uid,name,phone,address,notes}, cartLines:items, deliveryMethod, deliveryFee:tot.deliveryFee });
        clearCart();
        sessionStorage.setItem("rfs_last_order", JSON.stringify({ order, waLink:buildWhatsAppOrderLink(order) }));
        window.location.href = "order-success.html";
      } catch(e) {
        console.error(e);
        toast("Could not place order. Please try again.","error");
        btn.disabled = false; btn.textContent = "Place Order →";
      }
    });
    updateTotals();
  }
</script>
</body>
</html>
