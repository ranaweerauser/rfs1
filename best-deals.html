<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Special Offers — Ranaweera Family Super</title>
<link rel="icon" href="assets/images/logo.jpg"/>
<link rel="stylesheet" href="assets/css/style.css"/>
<link rel="stylesheet" href="assets/css/themes.css"/>
</head>
<body>
<div id="rfs-loading-overlay"><div class="rfs-loader"><div class="rfs-loader-ring"></div><div class="rfs-loader-ring rfs-loader-ring2"></div><div class="rfs-loader-dot"></div></div></div>
<header id="app-header" class="site-header"></header>
<div class="page-hero" style="background:linear-gradient(135deg,var(--orange) 0%,#c94d00 100%);">
  <h1>🔥 Special Offers</h1>
  <p>Hand-picked deals — updated when admin sets discounts. Prices drop instantly!</p>
</div>
<main class="container section">
  <div class="grid grid-products" id="deals-mount">
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
  </div>
</main>
<div id="app-floats"></div>
<nav id="app-bottomnav"></nav>
<footer id="app-footer" class="site-footer"></footer>
<script type="module">
  import "./assets/js/layout.js";
  import { subscribeProductsPage } from "./assets/js/products.js";
  import { addToCart } from "./assets/js/cart.js";
  import { escapeHtml, formatCurrency } from "./assets/js/ui-helpers.js";
  import { getEffectiveBasePrice, getDefaultQuantity, getUnitMeta } from "./assets/js/pricing.js";

  document.getElementById("rfs-loading-overlay").classList.add("hidden");
  const mount = document.getElementById("deals-mount");

  function card(p) {
    const meta = getUnitMeta(p.unitType);
    const ep = getEffectiveBasePrice(p);
    const pct = p.hasDiscount ? Math.round((1-ep/p.basePrice)*100) : 0;
    return `
    <div class="product-card" data-id="${p.id}">
      <span class="badge-flag" style="background:${p.bestDeals?"var(--green-dark)":"var(--orange)"};">${pct>0?`-${pct}%`:"DEAL"}</span>
      <a href="product.html?id=${p.id}" class="img-wrap">
        <img src="${p.images?.[0]||"assets/images/logo.jpg"}" alt="${escapeHtml(p.name)}" loading="lazy"/>
      </a>
      <div class="body">
        <span class="cat-label">${meta.icon} per ${meta.family==="weight"?"1Kg":meta.family==="volume"?"1L":"1 "+meta.label}</span>
        <a href="product.html?id=${p.id}"><div class="name">${escapeHtml(p.name)}</div></a>
        <div class="price-row">
          <span class="price">${formatCurrency(ep)}</span>
          ${p.hasDiscount?`<span class="price-strike">${formatCurrency(p.basePrice)}</span>`:""}
        </div>
        <button class="add-cart-btn" data-id="${p.id}" ${p.stock<=0?"disabled":""}>
          ${p.stock<=0?"Out of Stock":"Add to Cart"}
        </button>
      </div>
    </div>`;
  }

  subscribeProductsPage({ pageSize:120 }, ({ items }) => {
    const deals = (items||[]).filter((p) => p.hasDiscount||p.bestDeals);
    mount.innerHTML = deals.length
      ? deals.map(card).join("")
      : `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🔥</div><p>No active deals right now. Check back soon!</p></div>`;
    mount.querySelectorAll(".add-cart-btn:not([disabled])").forEach((btn) => {
      btn.addEventListener("click", () => {
        const p = deals.find((x) => x.id === btn.dataset.id);
        if (p) addToCart(p, getDefaultQuantity(p.unitType));
      });
    });
  });
</script>
</body>
</html>
